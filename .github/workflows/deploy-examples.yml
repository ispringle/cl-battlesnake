name: Deploy to Fly.io

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'examples/**'
      - 'Dockerfile'
      - 'fly.toml'
      - '.github/workflows/deploy-examples.yml'

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get deployment URL
        run: |
          URL=$(flyctl info --json | jq -r '.Hostname')
          echo "Deployed to: https://$URL"
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Random Randy:** https://$URL/random/" >> $GITHUB_STEP_SUMMARY
          echo "**Hungry Hank:** https://$URL/hungry/" >> $GITHUB_STEP_SUMMARY
          echo "**Cautious Carl:** https://$URL/cautious/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Register each URL at [play.battlesnake.com](https://play.battlesnake.com/)" >> $GITHUB_STEP_SUMMARY

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Test endpoints
        run: |
          APP_URL=$(flyctl info --json | jq -r '.Hostname')

          for SNAKE in random hungry cautious; do
            echo "Testing /$SNAKE/"

            RESPONSE=$(curl -s "https://$APP_URL/$SNAKE/")
            echo "Response: $RESPONSE"

            if echo "$RESPONSE" | jq -e '.name and .color and .head and .tail' > /dev/null; then
              echo "✅ $SNAKE endpoint passed"
            else
              echo "❌ $SNAKE endpoint failed"
              exit 1
            fi
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
